name: Feature or content request
description: Suggest a new section, topic, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to add or change?
      description: Be specific about the section or behavior you have in mind.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why would this help readers?
    validations:
      required: false
